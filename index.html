<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ПДР Тест — Підготовка до теоретичного іспиту</title>
  <meta name="description" content="Підготуйтеся до теоретичного іспиту з ПДР України. Вивчайте питання за блоками та перевіряйте знання тестами.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">🚗</div>
        <span class="logo-text">ПДР Тест</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Головна</a>
        <a href="#stats" class="nav-link">Статистика</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <!-- Hero -->
      <section class="hero">
        <div class="hero-badge">
          <span>🇺🇦</span>
          <span>Офіційна програма ПДР 2025</span>
        </div>
        <h1>Підготовка до<br><span>теоретичного іспиту</span></h1>
        <p>Вивчайте правила дорожнього руху за тематичними блоками та перевіряйте свої знання тестами</p>

        <div class="stats-bar" id="global-stats">
          <div class="stat-item">
            <div class="stat-value" id="total-questions">—</div>
            <div class="stat-label">Питань всього</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="total-blocks">—</div>
            <div class="stat-label">Тематичних блоків</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="total-tested">0%</div>
            <div class="stat-label">Загальний прогрес</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="best-score">—</div>
            <div class="stat-label">Кращий результат</div>
          </div>
        </div>
      </section>

      <!-- Blocks -->
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">📚 Тематичні блоки</h2>
          <div style="display:flex;gap:10px">
            <button class="btn btn-ghost" id="btn-reset-progress" onclick="resetAllProgress()">
              🔄 Скинути прогрес
            </button>
            <button class="btn btn-primary" onclick="startFullTest()">
              🎯 Фінальний тест
            </button>
          </div>
        </div>

        <div class="blocks-grid" id="blocks-grid">
          <!-- Generated by JS -->
        </div>
      </section>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
  <script>
    // Initialize the home page
    document.addEventListener('DOMContentLoaded', () => {
      renderBlocks();
      updateGlobalStats();
    });
  </script>
</body>
</html>
