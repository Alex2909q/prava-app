<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вивчення — ПДР Тест</title>
  <meta name="description" content="Режим вивчення питань ПДР за тематичними блоками">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">🚗</div>
        <span class="logo-text">ПДР Тест</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Головна</a>
        <a href="test.html" class="nav-link" id="test-link">Тест</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-inner">
        <a href="index.html" class="back-btn" title="Назад">←</a>
        <div class="page-info">
          <h2 id="block-title">Завантаження...</h2>
          <p id="block-meta">0 питань</p>
        </div>
        <div style="margin-left:auto;display:flex;gap:10px">
          <button class="btn btn-primary" id="go-to-test-btn" onclick="goToTest()">
            🎯 Пройти тест
          </button>
        </div>
      </div>
    </div>

    <!-- Study Container -->
    <div class="study-container">

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-cards" onclick="setMode('cards')">📇 Картки</button>
        <button class="mode-btn" id="mode-quiz" onclick="setMode('quiz')">❓ Вікторина</button>
      </div>

      <!-- Cards Mode -->
      <div id="cards-mode">
        <div class="question-counter">
          Питання <span id="cards-current">1</span> з <span id="cards-total">0</span>
          &nbsp;·&nbsp;
          <span id="cards-learned-count" style="color:var(--success)">0 вивчено</span>
        </div>

        <div class="flip-card-wrapper">
          <div class="flip-card" id="flip-card" onclick="flipCard()">
            <div class="flip-card-face flip-card-front">
              <div class="flip-label">Питання</div>
              <div class="flip-content" id="question-front">Завантаження...</div>
              <div class="flip-hint">👆 Натисніть, щоб побачити відповідь</div>
            </div>
            <div class="flip-card-face flip-card-back">
              <div class="flip-label">Правильна відповідь</div>
              <div class="flip-content" id="question-answer"></div>
            </div>
          </div>
        </div>

        <!-- Card Actions -->
        <div style="display:flex;gap:10px;justify-content:center;margin-bottom:24px">
          <button class="btn btn-danger" onclick="markCard(false)" id="btn-dont-know">
            ❌ Ще не знаю
          </button>
          <button class="btn btn-success" onclick="markCard(true)" id="btn-know">
            ✅ Знаю!
          </button>
        </div>

        <!-- Navigation -->
        <div class="study-nav">
          <button class="btn btn-ghost" onclick="prevQuestion()" id="prev-btn">← Попереднє</button>
          <div class="study-nav-center">
            <div class="progress-bar" style="width:200px;margin:0 auto">
              <div class="progress-fill" id="study-progress-fill" style="width:0%"></div>
            </div>
          </div>
          <button class="btn btn-ghost" onclick="nextQuestion()" id="next-btn">Наступне →</button>
        </div>
      </div>

      <!-- Quiz Mode -->
      <div id="quiz-mode" class="hidden">
        <div class="question-counter">
          Питання <span id="quiz-current">1</span> з <span id="quiz-total">0</span>
          &nbsp;·&nbsp;
          <span id="quiz-score-display" style="color:var(--success)">0 правильних</span>
        </div>

        <div class="question-card animate-in">
          <div class="question-text" id="quiz-question-text">Завантаження...</div>
        </div>

        <div class="answer-options" id="quiz-options">
          <!-- Generated by JS -->
        </div>

        <div style="display:flex;justify-content:center;margin-top:16px">
          <button class="btn btn-primary btn-lg hidden" id="quiz-next-btn" onclick="nextQuizQuestion()">
            Наступне →
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initStudyPage();
    });
  </script>
</body>
</html>
